<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARShot — Vue AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #header {
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    #header img { height: 28px; }
    #product-name {
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    model-viewer {
      width: 100%;
      flex: 1;
      min-height: 60dvh;
      --poster-color: transparent;
    }
    #ar-btn {
      margin: 20px;
      padding: 14px 32px;
      background: #0066FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #ar-btn:active { background: #0052cc; }
    #error {
      display: none;
      padding: 32px 20px;
      text-align: center;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="header">
    <span id="product-name">Chargement…</span>
  </div>

  <model-viewer
    id="viewer"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1"
    loading="eager"
  ></model-viewer>

  <button id="ar-btn" onclick="document.getElementById('viewer').activateAR()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    </svg>
    Voir en AR
  </button>

  <div id="error">Produit introuvable ou lien invalide.</div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const glb = params.get("glb");
      const usdz = params.get("usdz");
      const name = params.get("name") || "Produit AR";

      document.getElementById("product-name").textContent = name;
      document.title = name + " — ARShot";

      const viewer = document.getElementById("viewer");

      if (!glb) {
        viewer.style.display = "none";
        document.getElementById("ar-btn").style.display = "none";
        document.getElementById("error").style.display = "block";
        return;
      }

      viewer.setAttribute("src", glb);
      if (usdz) viewer.setAttribute("ios-src", usdz);
      viewer.setAttribute("alt", name);
    })();
  </script>
</body>
</html>
