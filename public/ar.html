<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARShot — Vue AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      color: #111;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #header {
      width: 100%;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    #product-name {
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #111;
    }
    model-viewer {
      width: 100%;
      flex: 1;
      min-height: 60dvh;
      background: #ffffff;
      --poster-color: #f5f5f5;
    }
    #ar-btn {
      margin: 20px;
      padding: 14px 32px;
      background: #0066FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #ar-btn:active { background: #0052cc; }
    #error {
      display: none;
      padding: 32px 20px;
      text-align: center;
      color: #888;
    }

    /* ── Interstitial AR auto-launch (?ar=true) ── */
    #ar-interstitial {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: linear-gradient(150deg, #0066FF 0%, #0044cc 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 32px;
      text-align: center;
    }
    #ar-interstitial .icon { font-size: 72px; }
    #ar-interstitial h2 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      max-width: 280px;
      line-height: 1.3;
    }
    #ar-interstitial p {
      color: rgba(255,255,255,0.8);
      font-size: 0.9rem;
      max-width: 260px;
      line-height: 1.5;
    }
    #launch-ar-btn {
      padding: 18px 44px;
      background: #fff;
      color: #0066FF;
      border: none;
      border-radius: 100px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      transition: transform 0.1s;
    }
    #launch-ar-btn:active { transform: scale(0.97); }
    #launch-ar-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #skip-ar-btn {
      color: rgba(255,255,255,0.6);
      background: none;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 8px;
    }
    #skip-ar-btn:hover { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>
  <!-- Interstitial AR auto-launch (shown when ?ar=true) -->
  <div id="ar-interstitial">
    <div class="icon">📱</div>
    <h2 id="interstitial-name">Produit AR</h2>
    <p>Visualisez ce produit dans votre espace en réalité augmentée</p>
    <button id="launch-ar-btn" disabled onclick="launchAR()">
      ⏳ Chargement…
    </button>
    <button id="skip-ar-btn" onclick="hideInterstitial()">
      Voir en 3D d'abord →
    </button>
  </div>

  <div id="header">
    <span id="product-name">Chargement…</span>
  </div>

  <model-viewer
    id="viewer"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    exposure="1.5"
    shadow-intensity="0.5"
    environment-image="neutral"
    loading="eager"
  ></model-viewer>

  <button id="ar-btn" onclick="document.getElementById('viewer').activateAR()">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    </svg>
    Voir en AR
  </button>

  <div id="error">Produit introuvable ou lien invalide.</div>

  <script>
    var viewer = document.getElementById('viewer');
    var modelLoaded = false;

    function launchAR() {
      hideInterstitial();
      try { viewer.activateAR(); } catch(e) {}
    }

    function hideInterstitial() {
      document.getElementById('ar-interstitial').style.display = 'none';
    }

    function onModelLoad() {
      modelLoaded = true;
      var btn = document.getElementById('launch-ar-btn');
      btn.disabled = false;
      btn.textContent = '✨ Lancer la réalité augmentée';
    }

    viewer.addEventListener('load', onModelLoad);

    (function () {
      var params = new URLSearchParams(window.location.search);
      var glb = params.get("glb");
      var usdz = params.get("usdz");
      var rawName = params.get("name") || "";
      var name = rawName.trim().length > 1 ? rawName.trim() : "Produit AR";
      var arMode = params.get("ar") === "true";

      document.getElementById("product-name").textContent = name;
      document.title = name + " — ARShot";

      if (!glb) {
        viewer.style.display = "none";
        document.getElementById("ar-btn").style.display = "none";
        document.getElementById("error").style.display = "block";
        return;
      }

      viewer.setAttribute("src", glb);
      if (usdz) viewer.setAttribute("ios-src", usdz);
      viewer.setAttribute("alt", name);

      // Show interstitial when ?ar=true
      if (arMode) {
        document.getElementById("interstitial-name").textContent = name;
        document.getElementById("ar-interstitial").style.display = "flex";
      }
    })();
  </script>
</body>
</html>
